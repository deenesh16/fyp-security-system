<!DOCTYPE html>
<html>
<head>
    <title>Login - Web Security Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            margin: 0;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 460px;
            margin: 70px auto;
            padding: 0 15px;
        }

        .card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
            padding: 32px;
        }

        h1 {
            text-align: center;
            margin: 0 0 8px;
            color: #0f172a;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #334155;
            margin-bottom: 8px;
            margin-top: 16px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .links {
            text-align: center;
            margin-top: 18px;
            line-height: 1.9;
        }

        .links a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h1>Login</h1>
            <div class="subtitle">Access your web security scanner account.</div>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="Enter your email" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <div class="links">
                <div><a href="/register">Create account</a></div>
                <div><a href="/forgot_password">Forgot password?</a></div>
            </div>
        </div>
    </div>
</body>
</html>
