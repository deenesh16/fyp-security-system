<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            margin: 0;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 700px;
            margin: 80px auto;
            padding: 0 15px;
        }

        .card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
            padding: 32px;
        }

        h1 {
            text-align: center;
            margin: 0 0 16px;
            color: #0f172a;
        }

        .message {
            text-align: center;
            color: #475569;
            line-height: 1.7;
            margin-bottom: 22px;
        }

        .error {
            background: #fff7ed;
            border: 1px solid #fdba74;
            color: #9a3412;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
        }

        .link-box {
            background: #f8fafc;
            border: 1px solid #dbe4ee;
            border-radius: 12px;
            padding: 14px;
            overflow-wrap: break-word;
            word-break: break-word;
            margin-bottom: 22px;
        }

        .link-box a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .link-box a:hover {
            text-decoration: underline;
        }

        .actions {
            text-align: center;
        }

        .actions a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .actions a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h1>{{ title }}</h1>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            {% if link %}
                <div class="message">
                    Use the link below to continue:
                </div>

                <div class="link-box">
                    <a href="{{ link }}">{{ link }}</a>
                </div>
            {% else %}
                <div class="message">
                    Please check your email inbox. If you do not see the message, check your spam folder as well.
                </div>
            {% endif %}

            <div class="actions">
                <a href="/login">Back to login</a>
            </div>
        </div>
    </div>
</body>
</html>
