<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Web Security Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            margin: 0;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 460px;
            margin: 70px auto;
            padding: 0 15px;
        }

        .card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
            padding: 32px;
        }

        h1 {
            text-align: center;
            margin: 0 0 8px;
            color: #0f172a;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #334155;
            margin-bottom: 8px;
            margin-top: 16px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #16a34a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #15803d;
        }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h1>Reset Password</h1>
            <div class="subtitle">Create a new password for your account.</div>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post">
                <label for="password">New Password</label>
                <input id="password" type="password" name="password" placeholder="Enter new password" required>

                <label for="confirm_password">Confirm Password</label>
                <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm new password" required>

                <button type="submit">Update Password</button>
            </form>
        </div>
    </div>
</body>
</html>
